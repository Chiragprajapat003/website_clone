<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cPanel Login - Authentication Required</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Alert Banner -->
        <div class="alert-banner">
            Authentication required
        </div>

        <!-- cPanel Logo -->
        <div class="logo">
            <img src="https://www.pngitem.com/pimgs/m/25-259896_cpanel-logo-blue-cpanel-logo-blue-hd-png.png" alt="cPanelID">
        </div>

        <!-- Login Form -->
        <form class="login-form">
            <!-- Email Input -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="email" placeholder="Enter your email." required>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" placeholder="Enter your account password." required>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">
                <span class="btn-icon">
                    <img src="https://tse3.mm.bing.net/th/id/OIP.XgPdqo2euNtdrcCYhfE3CAAAAA?cb=ucfimg2&pid=ImgDet&ucfimg=1&w=150&h=150&c=7&dpr=1.3&o=7&rm=3" alt="cPanel Icon">
                </span>
                Log in
            </button>

            <!-- Links -->
            <div class="form-links">
                <a href="#" class="link">Forgot Your Password?</a>
                <a href="#" class="link">Create an account</a>
            </div>
        </form>

        <!-- Footer -->
        <footer class="login-footer">
            <div class="footer-logo">
                <img src="https://tse3.mm.bing.net/th/id/OIP.XgPdqo2euNtdrcCYhfE3CAAAAA?cb=ucfimg2&pid=ImgDet&ucfimg=1&w=150&h=150&c=7&dpr=1.3&o=7&rm=3" alt="cPanel">
            </div>
            <p>Copyright © WebPros International LLC.</p>
        </footer>
    </div>
</body>
</html>
